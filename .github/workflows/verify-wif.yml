name: Verify WIF (Smoke Test)

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: "read"
      id-token: "write"

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (Dev)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.DEV_WIF_PROVIDER }}
          service_account: ${{ secrets.DEV_WIF_SERVICE_ACCOUNT }}

      - name: Verify Identity
        run: |
          echo "Authenticated Identity:"
          gcloud auth print-identity-token | base64 -d | cut -d . -f 2 2>/dev/null || echo "Token redacted"
          gcloud config list account

      - name: Verify Firebase Access
        run: |
          npm install -g firebase-tools
          firebase projects:list --non-interactive
