name: Deploy Dev

on:
  push:
    branches:
      - develop
  workflow_dispatch:

jobs:
  dev-deploy:
    permissions:
      contents: "read"
      id-token: "write"
    uses: ./.github/workflows/reusable-deploy.yml
    with:
      environment: "development"
      project_id: "ama-ecosystem-dev-9ceda"
      region: "us-west1"
      vite_secret_name: "VITE_GOOGLE_BROWSER_KEY"
    secrets:
      wif_provider: ${{ secrets.DEV_WIF_PROVIDER }}
      wif_service_account: ${{ secrets.DEV_WIF_SERVICE_ACCOUNT }}
      internal_health_token: ${{ secrets.DEV_INTERNAL_HEALTH_TOKEN }}
